name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm --prefix backend run prisma:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/quickserve
          JWT_ACCESS_SECRET: ci-access-secret
          JWT_REFRESH_SECRET: ci-refresh-secret

      - name: Build backend and admin dashboard
        run: npm run build
